name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_V2 }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN_V2 }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_V2 }}
      AZIFACE_ASSETS_URL: ${{ secrets.AZIFACE_ASSETS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@azify'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        run: npm run release
